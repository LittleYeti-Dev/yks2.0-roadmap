<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Helvetica, Arial, sans-serif">
<title>PINAX panel: FUNDAMENTUM</title>
<desc>NSQ-Wave panel for FUNDAMENTUM: freshness-custody problem, source-bound evidence, SKIPJACK answer.</desc>
<rect width="900" height="620" fill="#0F1419"/>
<rect x="0" y="0" width="6" height="620" fill="#00D9FF"/>
<path d="M40 40 q10 -16 20 0 t20 0 t20 0 t20 0 t20 0" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
<text x="40" y="92" fill="#E8EEFC" font-size="34" font-weight="700">FUNDAMENTUM</text>
<text x="40" y="118" fill="#8AA0C8" font-size="14.5">Custody &amp; Freshness Substrate · above Layer 7</text>
<rect x="690" y="64" width="170" height="30" rx="15" fill="#1A1F2E" stroke="#25324C"/>
<text x="775" y="84" fill="#00D9FF" font-size="13" text-anchor="middle" letter-spacing="1">PL-1 · THE KEEL</text>
<line x1="40" y1="140" x2="860" y2="140" stroke="#25324C" stroke-width="1"/>
<text x="40" y="172" fill="#00D9FF" font-size="13" letter-spacing="2">DOCUMENTED PROBLEM</text>
<text x="40" y="200" fill="#E8EEFC" font-size="18">State looks valid — right schema, right signature — yet nothing says</text>
<text x="40" y="226" fill="#E8EEFC" font-size="18">whether it is <tspan fill="#00D9FF" font-weight="700">still true</tspan>. Under a degraded link, systems serve stale</text>
<text x="40" y="252" fill="#E8EEFC" font-size="18">state silently, and autonomous agents act on it.</text>
<rect x="40" y="278" width="820" height="86" rx="10" fill="#1A1F2E" stroke="#00D9FF" stroke-width="1.5"/>
<text x="60" y="316" fill="#E8EEFC" font-size="22" font-weight="700">Provenance proves <tspan fill="#00D9FF">where</tspan> state came from.</text>
<text x="60" y="346" fill="#E8EEFC" font-size="22" font-weight="700">Nothing in the stack proves it is <tspan fill="#00D9FF">still current.</tspan></text>
<text x="840" y="353" fill="#8AA0C8" font-size="11" text-anchor="end">src: nsq:confident-misalignment-horizon</text>
<text x="40" y="396" fill="#00D9FF" font-size="13" letter-spacing="2">SOURCE-BOUND EVIDENCE</text>
<rect x="40" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="56" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Impossibility floor</text>
<text x="56" y="456" fill="#8AA0C8" font-size="12.5">Under partition: consistency</text>
<text x="56" y="473" fill="#8AA0C8" font-size="12.5">OR availability — never both.</text>
<text x="56" y="492" fill="#00D9FF" font-size="11">[Gilbert &amp; Lynch — CAP]</text>
<rect x="318" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="334" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Agents act stale</text>
<text x="334" y="456" fill="#8AA0C8" font-size="12.5">"Retrieve updated evidence</text>
<text x="334" y="473" fill="#8AA0C8" font-size="12.5">but fail to act on it."</text>
<text x="334" y="492" fill="#00D9FF" font-size="11">[stale-context literature]</text>
<rect x="596" y="408" width="264" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="612" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Freshness is a metric</text>
<text x="612" y="456" fill="#8AA0C8" font-size="12.5">Age of Information: "fundamental</text>
<text x="612" y="473" fill="#8AA0C8" font-size="12.5">metric for freshness."</text>
<text x="612" y="492" fill="#00D9FF" font-size="11">[AoI survey]</text>
<rect x="40" y="516" width="820" height="58" rx="10" fill="#00D9FF"/>
<text x="60" y="542" fill="#0F1419" font-size="14" font-weight="700" letter-spacing="1">SKIPJACK ANSWERS</text>
<text x="60" y="563" fill="#0F1419" font-size="15">Custody + a Freshness Quotient on every read. Serves under DIL, reconciles deterministically — never presents stale as live.</text>
<text x="40" y="600" fill="#8AA0C8" font-size="11">ACTA a1f3-fund-0F14 · KAIROS FQ fresh · source-bound</text>
<text x="860" y="600" fill="#8AA0C8" font-size="11" text-anchor="end">Non Sequitur Publishing — Confidential</text>
