<text x="40" y="172" fill="#00D9FF" font-size="13" letter-spacing="2">DOCUMENTED PROBLEM</text>
<text x="40" y="200" fill="#E8EEFC" font-size="18">Agents are built over perfect links and deployed at the</text>
<text x="40" y="226" fill="#E8EEFC" font-size="18">DDIL edge. The link is <tspan fill="#00D9FF" font-weight="700">the variable</tspan> — degradation is</text>
<text x="40" y="252" fill="#E8EEFC" font-size="18">discontinuous, and no rig surfaces it before the field.</text>
<rect x="40" y="278" width="820" height="86" rx="10" fill="#1A1F2E" stroke="#00D9FF" stroke-width="1.5"/>
<text x="60" y="316" fill="#E8EEFC" font-size="22" font-weight="700">Assumed perfect in test, revealed <tspan fill="#00D9FF">imperfect</tspan></text>
<text x="60" y="346" fill="#E8EEFC" font-size="22" font-weight="700">in production — where <tspan fill="#00D9FF">discovery costs most.</tspan></text>
<text x="840" y="353" fill="#8AA0C8" font-size="11" text-anchor="end">src: nsq:when-the-link-is-the-variable</text>
<text x="40" y="396" fill="#00D9FF" font-size="13" letter-spacing="2">SOURCE-BOUND EVIDENCE</text>
<rect x="40" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="56" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Degrades, not slows</text>
<text x="56" y="456" fill="#8AA0C8" font-size="12.5">Modest tool-failure rates drop</text>
<text x="56" y="473" fill="#8AA0C8" font-size="12.5">task completion sharply.</text>
<text x="56" y="492" fill="#00D9FF" font-size="11">[fault-injection literature]</text>
<rect x="318" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="334" y="434" fill="#E8EEFC" font-size="14" font-weight="700">No rig at the junction</text>
<text x="334" y="456" fill="#8AA0C8" font-size="12.5">SIL/HIL, emulation, agent eval</text>
<text x="334" y="473" fill="#8AA0C8" font-size="12.5">all mature; the join is empty</text>
<text x="334" y="492" fill="#00D9FF" font-size="11">[REF-MININET / REF-HAL]</text>
<rect x="596" y="408" width="264" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="612" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Tools know no agent</text>
<text x="612" y="456" fill="#8AA0C8" font-size="12.5">netem, Mininet, CORE impair</text>
<text x="612" y="473" fill="#8AA0C8" font-size="12.5">the net but bind no behavior.</text>
<text x="612" y="492" fill="#00D9FF" font-size="11">[REF-NETEM / REF-CORE]</text>
<rect x="40" y="516" width="820" height="58" rx="10" fill="#00D9FF"/>
<text x="60" y="542" fill="#0F1419" font-size="14" font-weight="700" letter-spacing="1">SKIPJACK ANSWERS</text>
<text x="60" y="563" fill="#0F1419" font-size="15">An R0-R5 scenario ladder over kernel emulation, bound to agent observability, deterministic replay, and pass/fail conformance.</text>
