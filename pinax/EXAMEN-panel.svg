<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Helvetica, Arial, sans-serif">
<title>PINAX panel: EXAMEN</title>
<desc>NSQ-Wave panel for EXAMEN: self-attestation gap, source-bound evidence, SKIPJACK answer.</desc>
<rect width="900" height="620" fill="#0F1419"/>
<rect x="0" y="0" width="6" height="620" fill="#00D9FF"/>
<path d="M40 40 q10 -16 20 0 t20 0 t20 0 t20 0 t20 0" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
<text x="40" y="92" fill="#E8EEFC" font-size="34" font-weight="700">EXAMEN</text>
<text x="40" y="118" fill="#8AA0C8" font-size="14.5">Agent Assurance · QA &amp; Eval</text>
<rect x="690" y="64" width="170" height="30" rx="15" fill="#1A1F2E" stroke="#25324C"/>
<text x="775" y="84" fill="#00D9FF" font-size="13" text-anchor="middle" letter-spacing="1">PL-9 · ASSURANCE</text>
<line x1="40" y1="140" x2="860" y2="140" stroke="#25324C" stroke-width="1"/>
<text x="40" y="172" fill="#00D9FF" font-size="13" letter-spacing="2">DOCUMENTED PROBLEM</text>
<text x="40" y="200" fill="#E8EEFC" font-size="18">The prevailing pattern is self-attestation: the agent — or a</text>
<text x="40" y="226" fill="#E8EEFC" font-size="18">sibling of the same model — <tspan fill="#00D9FF" font-weight="700">grades its own work</tspan>. Author and</text>
<text x="40" y="252" fill="#E8EEFC" font-size="18">verifier collapse into one epistemic actor.</text>
<rect x="40" y="278" width="820" height="86" rx="10" fill="#1A1F2E" stroke="#00D9FF" stroke-width="1.5"/>
<text x="60" y="316" fill="#E8EEFC" font-size="22" font-weight="700">Models <tspan fill="#00D9FF">cannot self-correct</tspan> reasoning</text>
<text x="60" y="346" fill="#E8EEFC" font-size="22" font-weight="700">without external signal. Eval only <tspan fill="#00D9FF">measures.</tspan></text>
<text x="840" y="353" fill="#8AA0C8" font-size="11" text-anchor="end">src: [1] cannot-self-correct</text>
<text x="40" y="396" fill="#00D9FF" font-size="13" letter-spacing="2">SOURCE-BOUND EVIDENCE</text>
<rect x="40" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="56" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Judges are gameable</text>
<text x="56" y="456" fill="#8AA0C8" font-size="12.5">Prompt injection reaches 73.8%</text>
<text x="56" y="473" fill="#8AA0C8" font-size="12.5">against popular judge models.</text>
<text x="56" y="492" fill="#00D9FF" font-size="11">[4]</text>
<rect x="318" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="334" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Failures run high</text>
<text x="334" y="456" fill="#8AA0C8" font-size="12.5">41% to 86.7% failure across 7</text>
<text x="334" y="473" fill="#8AA0C8" font-size="12.5">multi-agent frameworks.</text>
<text x="334" y="492" fill="#00D9FF" font-size="11">[9]</text>
<rect x="596" y="408" width="264" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="612" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Single judges biased</text>
<text x="612" y="456" fill="#8AA0C8" font-size="12.5">Self-preference, position, and</text>
<text x="612" y="473" fill="#8AA0C8" font-size="12.5">length bias are systematic.</text>
<text x="612" y="492" fill="#00D9FF" font-size="11">[2][3]</text>
<rect x="40" y="516" width="820" height="58" rx="10" fill="#00D9FF"/>
<text x="60" y="542" fill="#0F1419" font-size="14" font-weight="700" letter-spacing="1">SKIPJACK ANSWERS</text>
<text x="60" y="563" fill="#0F1419" font-size="15">Author != verifier: a diverse cross-model committee renders the verdict and emits a signed conformance artifact — evidence, not a score.</text>
<text x="40" y="600" fill="#8AA0C8" font-size="11">EXAMEN examen-tag · cross-model committee · source-bound</text>
<text x="860" y="600" fill="#8AA0C8" font-size="11" text-anchor="end">Non Sequitur Publishing — Confidential</text>
</svg>
