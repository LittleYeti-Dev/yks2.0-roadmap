<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Helvetica, Arial, sans-serif">
<title>PINAX panel: MENTOR</title>
<desc>NSQ-Wave panel for MENTOR: stale-OT and control-write problem, source-bound evidence, SKIPJACK answer.</desc>
<rect width="900" height="620" fill="#0F1419"/>
<rect x="0" y="0" width="6" height="620" fill="#00D9FF"/>
<path d="M40 40 q10 -16 20 0 t20 0 t20 0 t20 0 t20 0" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
<text x="40" y="92" fill="#E8EEFC" font-size="34" font-weight="700">MENTOR</text>
<text x="40" y="118" fill="#8AA0C8" font-size="14.5">OT/SCADA Degraded-Mode Advisory Sidecar</text>
<rect x="690" y="64" width="170" height="30" rx="15" fill="#1A1F2E" stroke="#25324C"/>
<text x="775" y="84" fill="#00D9FF" font-size="13" text-anchor="middle" letter-spacing="1">PL-10 · OT</text>
<line x1="40" y1="140" x2="860" y2="140" stroke="#25324C" stroke-width="1"/>
<text x="40" y="172" fill="#00D9FF" font-size="13" letter-spacing="2">DOCUMENTED PROBLEM</text>
<text x="40" y="200" fill="#E8EEFC" font-size="18">SCADA shows stale tags as live when quality metadata</text>
<text x="40" y="226" fill="#E8EEFC" font-size="18">is dropped. Now vendors propose <tspan fill="#00D9FF" font-weight="700">LLM write authority</tspan></text>
<text x="40" y="252" fill="#E8EEFC" font-size="18">over control loops — unsafe on first principles.</text>
<rect x="40" y="278" width="820" height="86" rx="10" fill="#1A1F2E" stroke="#00D9FF" stroke-width="1.5"/>
<text x="60" y="316" fill="#E8EEFC" font-size="22" font-weight="700">No single component is broken,</text>
<text x="60" y="346" fill="#E8EEFC" font-size="22" font-weight="700">yet the system as a whole <tspan fill="#00D9FF">lies.</tspan></text>
<text x="840" y="353" fill="#8AA0C8" font-size="11" text-anchor="end">src: OPC-UA quality propagation [1][2]</text>
<text x="40" y="396" fill="#00D9FF" font-size="13" letter-spacing="2">SOURCE-BOUND EVIDENCE</text>
<rect x="40" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="56" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Stale shown as live</text>
<text x="56" y="456" fill="#8AA0C8" font-size="12.5">Frozen last-known value is</text>
<text x="56" y="473" fill="#8AA0C8" font-size="12.5">indistinguishable on screen.</text>
<text x="56" y="492" fill="#00D9FF" font-size="11">[OPC-UA StatusCode 1][3]</text>
<rect x="318" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="334" y="434" fill="#E8EEFC" font-size="14" font-weight="700">No AI write to control</text>
<text x="334" y="456" fill="#8AA0C8" font-size="12.5">Hallucination is innate; LLMs</text>
<text x="334" y="473" fill="#8AA0C8" font-size="12.5">unfit for safety control.</text>
<text x="334" y="492" fill="#00D9FF" font-size="11">[hallucination analysis 9]</text>
<rect x="596" y="408" width="264" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="612" y="434" fill="#E8EEFC" font-size="14" font-weight="700">DDIL by default</text>
<text x="612" y="456" fill="#8AA0C8" font-size="12.5">Sites are degraded; a cloud</text>
<text x="612" y="473" fill="#8AA0C8" font-size="12.5">round-trip fails when needed.</text>
<text x="612" y="492" fill="#00D9FF" font-size="11">[edge-uncertainty arch 13][15]</text>
<rect x="40" y="516" width="820" height="58" rx="10" fill="#00D9FF"/>
<text x="60" y="542" fill="#0F1419" font-size="14" font-weight="700" letter-spacing="1">SKIPJACK ANSWERS</text>
<text x="60" y="563" fill="#0F1419" font-size="15">A protocol-aware sidecar beside the loop: never writes to control, tracks per-tag freshness, degrades gracefully under DDIL.</text>
<text x="40" y="600" fill="#8AA0C8" font-size="11">MENTOR e5f7-mnt-0F14 · advisory tier · source-bound</text>
<text x="860" y="600" fill="#8AA0C8" font-size="11" text-anchor="end">Non Sequitur Publishing — Confidential</text>
</svg>
