<path d="M40 40 q10 -16 20 0 t20 0 t20 0 t20 0 t20 0" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
<text x="40" y="92" fill="#E8EEFC" font-size="34" font-weight="700">THESAURUS</text>
<text x="40" y="118" fill="#8AA0C8" font-size="14.5">Agent Memory &amp; Knowledge Fabric</text>
<rect x="690" y="64" width="170" height="30" rx="15" fill="#1A1F2E" stroke="#25324C"/>
<text x="775" y="84" fill="#00D9FF" font-size="13" text-anchor="middle" letter-spacing="1">PL-4 · MEMORY</text>
<line x1="40" y1="140" x2="860" y2="140" stroke="#25324C" stroke-width="1"/>
<text x="40" y="172" fill="#00D9FF" font-size="13" letter-spacing="2">DOCUMENTED PROBLEM</text>
<text x="40" y="200" fill="#E8EEFC" font-size="18">Fleets share persistent memory, yet it is the weakest, least</text>
<text x="40" y="226" fill="#E8EEFC" font-size="18">governed layer in the stack. A single <tspan fill="#00D9FF" font-weight="700">poisoned memory</tspan></text>
<text x="40" y="252" fill="#E8EEFC" font-size="18">propagates to every agent that retrieves it.</text>
<rect x="40" y="278" width="820" height="86" rx="10" fill="#1A1F2E" stroke="#00D9FF" stroke-width="1.5"/>
<text x="60" y="316" fill="#E8EEFC" font-size="22" font-weight="700">The market competes on <tspan fill="#00D9FF">recall</tspan>.</text>
<text x="60" y="346" fill="#E8EEFC" font-size="22" font-weight="700">No one proves memory is <tspan fill="#00D9FF">trustworthy.</tspan></text>
<text x="840" y="353" fill="#8AA0C8" font-size="11" text-anchor="end">src: THESAURUS §2.4 — market gap</text>
<text x="40" y="396" fill="#00D9FF" font-size="13" letter-spacing="2">SOURCE-BOUND EVIDENCE</text>
<rect x="40" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="56" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Memory poisoning</text>
<text x="56" y="456" fill="#8AA0C8" font-size="12.5">&gt;95% injection success via</text>
<text x="56" y="473" fill="#8AA0C8" font-size="12.5">query-only access.</text>
<text x="56" y="492" fill="#00D9FF" font-size="11">[MINJA, 4]</text>
<rect x="318" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="334" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Stale retrieval</text>
<text x="334" y="456" fill="#8AA0C8" font-size="12.5">Index staleness is a high-</text>
<text x="334" y="473" fill="#8AA0C8" font-size="12.5">frequency RAG failure mode.</text>
<text x="334" y="492" fill="#00D9FF" font-size="11">[RAG stack review, 9]</text>
<rect x="596" y="408" width="264" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="612" y="434" fill="#E8EEFC" font-size="14" font-weight="700">No ZT for memory</text>
<text x="612" y="456" fill="#8AA0C8" font-size="12.5">800-207 zero-trust never</text>
<text x="612" y="473" fill="#8AA0C8" font-size="12.5">applied to memory reads.</text>
<text x="612" y="492" fill="#00D9FF" font-size="11">[NIST SP 800-207, 11]</text>
<rect x="40" y="516" width="820" height="58" rx="10" fill="#00D9FF"/>
<text x="60" y="542" fill="#0F1419" font-size="14" font-weight="700" letter-spacing="1">SKIPJACK ANSWERS</text>
<text x="60" y="563" fill="#0F1419" font-size="15">A git-backed memory fabric: signed, content-addressed objects, verifiable lineage, zero-trust policy enforced at recall.</text>
<text x="40" y="600" fill="#8AA0C8" font-size="11">THESAURUS thes-mem-0F14 · provenance-bearing · source-bound</text>
<text x="860" y="600" fill="#8AA0C8" font-size="11" text-anchor="end">Non Sequitur Publishing — Confidential</text>
