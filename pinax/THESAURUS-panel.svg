<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Helvetica, Arial, sans-serif">
<title>PINAX panel: THESAURUS</title>
<desc>NSQ-Wave panel for THESAURUS: ungoverned agent memory problem, source-bound evidence, SKIPJACK answer.</desc>
