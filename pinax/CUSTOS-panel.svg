<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Helvetica, Arial, sans-serif">
<title>PINAX panel: CUSTOS</title>
<desc>NSQ-Wave panel for CUSTOS: unmediated agentic cross-domain transfer, source-bound evidence, SKIPJACK answer.</desc>
<rect width="900" height="620" fill="#0F1419"/>
<rect x="0" y="0" width="6" height="620" fill="#00D9FF"/>
<path d="M40 40 q10 -16 20 0 t20 0 t20 0 t20 0 t20 0" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
<text x="40" y="92" fill="#E8EEFC" font-size="34" font-weight="700">CUSTOS</text>
<text x="40" y="118" fill="#8AA0C8" font-size="14.5">Cross-Domain Integrity Guard · above Layer 7</text>
<rect x="690" y="64" width="170" height="30" rx="15" fill="#1A1F2E" stroke="#25324C"/>
<text x="775" y="84" fill="#00D9FF" font-size="13" text-anchor="middle" letter-spacing="1">CROSS-DOMAIN</text>
<line x1="40" y1="140" x2="860" y2="140" stroke="#25324C" stroke-width="1"/>
<text x="40" y="172" fill="#00D9FF" font-size="13" letter-spacing="2">DOCUMENTED PROBLEM</text>
<text x="40" y="200" fill="#E8EEFC" font-size="18">Agentic output crosses a classification boundary through</text>
<text x="40" y="226" fill="#E8EEFC" font-size="18">ordinary pipes with <tspan fill="#00D9FF" font-weight="700">no CDS mediation</tspan> — no label, no filter,</text>
<text x="40" y="252" fill="#E8EEFC" font-size="18">no auditable release. The transfer is real; the guard absent.</text>
<rect x="40" y="278" width="820" height="86" rx="10" fill="#1A1F2E" stroke="#00D9FF" stroke-width="1.5"/>
<text x="60" y="316" fill="#E8EEFC" font-size="22" font-weight="700">Verifying the agent is <tspan fill="#00D9FF">necessary</tspan>.</text>
<text x="60" y="346" fill="#E8EEFC" font-size="22" font-weight="700">Verifying the <tspan fill="#00D9FF">message</tspan> is what was missing.</text>
<text x="840" y="353" fill="#8AA0C8" font-size="11" text-anchor="end">src: SANS — intent is the action-layer surface</text>
<text x="40" y="396" fill="#00D9FF" font-size="13" letter-spacing="2">SOURCE-BOUND EVIDENCE</text>
<rect x="40" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="56" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Excessive Agency</text>
<text x="56" y="456" fill="#8AA0C8" font-size="12.5">Functionality, permissions,</text>
<text x="56" y="473" fill="#8AA0C8" font-size="12.5">autonomy beyond task scope.</text>
<text x="56" y="492" fill="#00D9FF" font-size="11">[OWASP — agentic risks]</text>
<rect x="318" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="334" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Zero-click exfiltration</text>
<text x="334" y="456" fill="#8AA0C8" font-size="12.5">EchoLeak: pure-text leak,</text>
<text x="334" y="473" fill="#8AA0C8" font-size="12.5">no code execution required.</text>
<text x="334" y="492" fill="#00D9FF" font-size="11">[CVE-2025-32711]</text>
<rect x="596" y="408" width="264" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="612" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Emission is a signal</text>
<text x="612" y="456" fill="#8AA0C8" font-size="12.5">Cadence and volume disclose</text>
<text x="612" y="473" fill="#8AA0C8" font-size="12.5">tempo to a contested observer.</text>
<text x="612" y="492" fill="#00D9FF" font-size="11">[USNI — EMCON]</text>
<rect x="40" y="516" width="820" height="58" rx="10" fill="#00D9FF"/>
<text x="60" y="542" fill="#0F1419" font-size="14" font-weight="700" letter-spacing="1">SKIPJACK ANSWERS</text>
<text x="60" y="563" fill="#0F1419" font-size="15">A deterministic guard labels, adjudicates, and records every release; verifies inbound provenance; shapes emission. Agent stays untrusted.</text>
<text x="40" y="600" fill="#8AA0C8" font-size="11">CUSTOS a1f3-cust-0F14 · deterministic guard · source-bound</text>
<text x="860" y="600" fill="#8AA0C8" font-size="11" text-anchor="end">Non Sequitur Publishing — Confidential</text>
</svg>
