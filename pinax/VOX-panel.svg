<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Helvetica, Arial, sans-serif">
<title>PINAX panel: VOX</title>
<desc>NSQ-Wave panel for VOX: ungoverned content problem, source-bound evidence, SKIPJACK answer.</desc>
<rect width="900" height="620" fill="#0F1419"/>
<rect x="0" y="0" width="6" height="620" fill="#00D9FF"/>
<path d="M40 40 q10 -16 20 0 t20 0 t20 0 t20 0 t20 0" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
<text x="40" y="92" fill="#E8EEFC" font-size="34" font-weight="700">VOX</text>
<text x="40" y="118" fill="#8AA0C8" font-size="14.5">Social Media Planning-in-a-Box · governed editorial</text>
<rect x="690" y="64" width="170" height="30" rx="15" fill="#1A1F2E" stroke="#25324C"/>
<text x="775" y="84" fill="#00D9FF" font-size="13" text-anchor="middle" letter-spacing="1">PL-6 · EDITORIAL</text>
<line x1="40" y1="140" x2="860" y2="140" stroke="#25324C" stroke-width="1"/>
<text x="40" y="172" fill="#00D9FF" font-size="13" letter-spacing="2">DOCUMENTED PROBLEM</text>
<text x="40" y="200" fill="#E8EEFC" font-size="18">Generation is cheap; governance is not. Output ships at</text>
<text x="40" y="226" fill="#E8EEFC" font-size="18">machine speed, <tspan fill="#00D9FF" font-weight="700">accounted at human speed</tspan> — off-brand,</text>
<text x="40" y="252" fill="#E8EEFC" font-size="18">provenance-blind, undisclosed as machine-generated.</text>
<rect x="40" y="278" width="820" height="86" rx="10" fill="#1A1F2E" stroke="#00D9FF" stroke-width="1.5"/>
<text x="60" y="316" fill="#E8EEFC" font-size="22" font-weight="700">The market made <tspan fill="#00D9FF">generation</tspan> abundant.</text>
<text x="60" y="346" fill="#E8EEFC" font-size="22" font-weight="700">It left <tspan fill="#00D9FF">governance</tspan> scarce — and now mandatory.</text>
<text x="840" y="353" fill="#8AA0C8" font-size="11" text-anchor="end">src: EU AI Act Art. 50</text>
<text x="40" y="396" fill="#00D9FF" font-size="13" letter-spacing="2">SOURCE-BOUND EVIDENCE</text>
<rect x="40" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="56" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Disclosure deadline</text>
<text x="56" y="456" fill="#8AA0C8" font-size="12.5">Machine-readable AI marking</text>
<text x="56" y="473" fill="#8AA0C8" font-size="12.5">required from Aug 2026.</text>
<text x="56" y="492" fill="#00D9FF" font-size="11">[EU-AIA-ART50]</text>
<rect x="318" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="334" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Trust has collapsed</text>
<text x="334" y="456" fill="#8AA0C8" font-size="12.5">58% worry what is real or</text>
<text x="334" y="473" fill="#8AA0C8" font-size="12.5">fake online; 12% trust AI news</text>
<text x="334" y="492" fill="#00D9FF" font-size="11">[Reuters Digital News 2025]</text>
<rect x="596" y="408" width="264" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="612" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Weaponized at scale</text>
<text x="612" y="456" fill="#8AA0C8" font-size="12.5">27% of info-manipulation</text>
<text x="612" y="473" fill="#8AA0C8" font-size="12.5">attempts used AI in 2025.</text>
<text x="612" y="492" fill="#00D9FF" font-size="11">[EU assessment 2025]</text>
<rect x="40" y="516" width="820" height="58" rx="10" fill="#00D9FF"/>
<text x="60" y="542" fill="#0F1419" font-size="14" font-weight="700" letter-spacing="1">SKIPJACK ANSWERS</text>
<text x="60" y="563" fill="#0F1419" font-size="15">Every artifact is an editorial pipeline output: enforced voice policy, C2PA provenance, embedded disclosure, auditable authority chain.</text>
<text x="40" y="600" fill="#8AA0C8" font-size="11">VOX c3d5-vox-0F14 · editorial pipeline · source-bound</text>
<text x="860" y="600" fill="#8AA0C8" font-size="11" text-anchor="end">Non Sequitur Publishing — Confidential</text>
</svg>
