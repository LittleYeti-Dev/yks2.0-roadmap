<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Helvetica, Arial, sans-serif">
<title>PINAX panel: KAIROS</title>
<desc>NSQ-Wave panel for KAIROS: evident-staleness problem, source-bound evidence, SKIPJACK answer.</desc>
<rect width="900" height="620" fill="#0F1419"/>
<rect x="0" y="0" width="6" height="620" fill="#00D9FF"/>
<path d="M40 40 q10 -16 20 0 t20 0 t20 0 t20 0 t20 0" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
<text x="40" y="92" fill="#E8EEFC" font-size="34" font-weight="700">KAIROS</text>
<text x="40" y="118" fill="#8AA0C8" font-size="14.5">Evident-Staleness / Freshness-Quotient SDK</text>
<rect x="690" y="64" width="170" height="30" rx="15" fill="#1A1F2E" stroke="#25324C"/>
<text x="775" y="84" fill="#00D9FF" font-size="13" text-anchor="middle" letter-spacing="1">PL-1 · SDK</text>
<line x1="40" y1="140" x2="860" y2="140" stroke="#25324C" stroke-width="1"/>
<text x="40" y="172" fill="#00D9FF" font-size="13" letter-spacing="2">DOCUMENTED PROBLEM</text>
<text x="40" y="200" fill="#E8EEFC" font-size="18">A value is read, time passes, the world moves on — yet the</text>
<text x="40" y="226" fill="#E8EEFC" font-size="18">data carries no account of its own <tspan fill="#00D9FF" font-weight="700">age</tspan>. Agents act on a past</text>
<text x="40" y="252" fill="#E8EEFC" font-size="18">that no longer exists, with undiminished confidence.</text>
<rect x="40" y="278" width="820" height="86" rx="10" fill="#1A1F2E" stroke="#00D9FF" stroke-width="1.5"/>
<text x="60" y="316" fill="#E8EEFC" font-size="22" font-weight="700">Freshness is managed <tspan fill="#00D9FF">per screen</tspan>, as fresh/failed.</text>
<text x="60" y="346" fill="#E8EEFC" font-size="22" font-weight="700">Decisions consume data <tspan fill="#00D9FF">per field.</tspan></text>
<text x="840" y="353" fill="#8AA0C8" font-size="11" text-anchor="end">src: KAIROS §3 — two errors</text>
<text x="40" y="396" fill="#00D9FF" font-size="13" letter-spacing="2">SOURCE-BOUND EVIDENCE</text>
<rect x="40" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="56" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Agents are time-blind</text>
<text x="56" y="456" fill="#8AA0C8" font-size="12.5">Over-rely on outdated state,</text>
<text x="56" y="473" fill="#8AA0C8" font-size="12.5">unaware of elapsed time.</text>
<text x="56" y="492" fill="#00D9FF" font-size="11">[Wang et al. arXiv:2510.23853]</text>
<rect x="318" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="334" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Silent overconfidence</text>
<text x="334" y="456" fill="#8AA0C8" font-size="12.5">~10% calibration error;</text>
<text x="334" y="473" fill="#8AA0C8" font-size="12.5">wrong answers, stated sure.</text>
<text x="334" y="492" fill="#00D9FF" font-size="11">[Xiong et al. arXiv:2306.13063]</text>
<rect x="596" y="408" width="264" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="612" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Stale prices cost</text>
<text x="612" y="456" fill="#8AA0C8" font-size="12.5">2.4 bps per stale execution;</text>
<text x="612" y="473" fill="#8AA0C8" font-size="12.5">GBP 4.2M/yr UK dark pools.</text>
<text x="612" y="492" fill="#00D9FF" font-size="11">[Aquilina, BIS WP 1115]</text>
<rect x="40" y="516" width="820" height="58" rx="10" fill="#00D9FF"/>
<text x="60" y="542" fill="#0F1419" font-size="14" font-weight="700" letter-spacing="1">SKIPJACK ANSWERS</text>
<text x="60" y="563" fill="#0F1419" font-size="15">A per-field triple — age, staleness-class, provenance — on every read. Fields reason-as-stale rather than fail silently.</text>
<text x="40" y="600" fill="#8AA0C8" font-size="11">KAIROS kair-fq-0F14 · per-field FQ · source-bound</text>
<text x="860" y="600" fill="#8AA0C8" font-size="11" text-anchor="end">Non Sequitur Publishing — Confidential</text>
</svg>
