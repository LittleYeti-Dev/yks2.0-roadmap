<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Helvetica, Arial, sans-serif">
<title>PINAX panel: CAPSTONE</title>
<desc>NSQ-Wave panel for CAPSTONE: implicit trust across four planes, source-bound evidence, SKIPJACK zero-trust answer.</desc>
<rect width="900" height="620" fill="#0F1419"/>
<rect x="0" y="0" width="6" height="620" fill="#00D9FF"/>
<path d="M40 40 q10 -16 20 0 t20 0 t20 0 t20 0 t20 0" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
<text x="40" y="92" fill="#E8EEFC" font-size="30" font-weight="700">CAPSTONE</text>
<text x="40" y="118" fill="#8AA0C8" font-size="14.5">Zero-Trust Across Four Planes · above Layer 7</text>
<rect x="690" y="64" width="170" height="30" rx="15" fill="#1A1F2E" stroke="#25324C"/>
<text x="775" y="84" fill="#00D9FF" font-size="13" text-anchor="middle" letter-spacing="1">CAPSTONE</text>
<line x1="40" y1="140" x2="860" y2="140" stroke="#25324C" stroke-width="1"/>
<text x="40" y="172" fill="#00D9FF" font-size="13" letter-spacing="2">DOCUMENTED PROBLEM</text>
<text x="40" y="200" fill="#E8EEFC" font-size="18">Across data, actor, behavior, and provenance, agents share</text>
<text x="40" y="226" fill="#E8EEFC" font-size="18">one root failure: <tspan fill="#00D9FF" font-weight="700">implicit trust</tspan>. Stale data, standing keys,</text>
<text x="40" y="252" fill="#E8EEFC" font-size="18">self-report, arrived artifacts — each trust is misplaced.</text>
<rect x="40" y="278" width="820" height="86" rx="10" fill="#1A1F2E" stroke="#00D9FF" stroke-width="1.5"/>
<text x="60" y="316" fill="#E8EEFC" font-size="22" font-weight="700">Not four problems needing four tools —</text>
<text x="60" y="346" fill="#E8EEFC" font-size="22" font-weight="700">one <tspan fill="#00D9FF">posture</tspan>, applied four times, beneath all.</text>
<text x="840" y="353" fill="#8AA0C8" font-size="11" text-anchor="end">src: NIST SP 800-207 — seven tenets</text>
<text x="40" y="396" fill="#00D9FF" font-size="13" letter-spacing="2">SOURCE-BOUND EVIDENCE</text>
<rect x="40" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="56" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Standing privilege persists</text>
<text x="56" y="456" fill="#8AA0C8" font-size="12.5">Just-in-time access reached</text>
<text x="56" y="473" fill="#8AA0C8" font-size="12.5">~1% of organizations.</text>
<text x="56" y="492" fill="#00D9FF" font-size="11">[CyberArk]</text>
<rect x="318" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="334" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Injection beats defenses</text>
<text x="334" y="456" fill="#8AA0C8" font-size="12.5">Adaptive prompt injection</text>
<text x="334" y="473" fill="#8AA0C8" font-size="12.5">exceeds 85% success rate.</text>
<text x="334" y="492" fill="#00D9FF" font-size="11">[arXiv:2511.05269]</text>
<rect x="596" y="408" width="264" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="612" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Supply chain attacked</text>
<text x="612" y="456" fill="#8AA0C8" font-size="12.5">~88,000 malicious instances;</text>
<text x="612" y="473" fill="#8AA0C8" font-size="12.5">a 633% year-over-year rise.</text>
<text x="612" y="492" fill="#00D9FF" font-size="11">[arXiv:2308.04898]</text>
<rect x="40" y="516" width="820" height="58" rx="10" fill="#00D9FF"/>
<text x="60" y="542" fill="#0F1419" font-size="14" font-weight="700" letter-spacing="1">SKIPJACK ANSWERS</text>
<text x="60" y="563" fill="#0F1419" font-size="15">Zero trust enforced once at the substrate; ten lines realize it per plane. Explicit, continuous, per-transaction verification — never implicit.</text>
<text x="40" y="600" fill="#8AA0C8" font-size="11">CAPSTONE a1f3-caps-0F14 · enforce once, inherit · source-bound</text>
<text x="860" y="600" fill="#8AA0C8" font-size="11" text-anchor="end">Non Sequitur Publishing — Confidential</text>
</svg>
