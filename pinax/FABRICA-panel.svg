<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Helvetica, Arial, sans-serif">
<title>PINAX panel: FABRICA</title>
<desc>NSQ-Wave panel for FABRICA: ungoverned-agent delivery problem, source-bound evidence, SKIPJACK answer.</desc>
<rect width="900" height="620" fill="#0F1419"/>
<rect x="0" y="0" width="6" height="620" fill="#00D9FF"/>
<path d="M40 40 q10 -16 20 0 t20 0 t20 0 t20 0 t20 0" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
<text x="40" y="92" fill="#E8EEFC" font-size="34" font-weight="700">FABRICA</text>
<text x="40" y="118" fill="#8AA0C8" font-size="14.5">Agentic SAFe Scrum-in-a-Box · governed delivery</text>
<rect x="690" y="64" width="170" height="30" rx="15" fill="#1A1F2E" stroke="#25324C"/>
<text x="775" y="84" fill="#00D9FF" font-size="13" text-anchor="middle" letter-spacing="1">PL-6 · DELIVERY</text>
<line x1="40" y1="140" x2="860" y2="140" stroke="#25324C" stroke-width="1"/>
<text x="40" y="172" fill="#00D9FF" font-size="13" letter-spacing="2">DOCUMENTED PROBLEM</text>
<text x="40" y="200" fill="#E8EEFC" font-size="18">Agents build a growing share of code, but ungoverned</text>
<text x="40" y="226" fill="#E8EEFC" font-size="18">throughput <tspan fill="#00D9FF" font-weight="700">buys instability</tspan> — higher bug rates, larger PRs,</text>
<text x="40" y="252" fill="#E8EEFC" font-size="18">more rework. SAFe, Scrum, MBSE assume human teams.</text>
<rect x="40" y="278" width="820" height="86" rx="10" fill="#1A1F2E" stroke="#00D9FF" stroke-width="1.5"/>
<text x="60" y="316" fill="#E8EEFC" font-size="22" font-weight="700">An agent fleet is a <tspan fill="#00D9FF">production engine.</tspan></text>
<text x="60" y="346" fill="#E8EEFC" font-size="22" font-weight="700">Ungoverned, it manufactures <tspan fill="#00D9FF">instability.</tspan></text>
<text x="840" y="353" fill="#8AA0C8" font-size="11" text-anchor="end">src: DORA 2024-2025 [2]</text>
<text x="40" y="396" fill="#00D9FF" font-size="13" letter-spacing="2">SOURCE-BOUND EVIDENCE</text>
<rect x="40" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="56" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Throughput vs quality</text>
<text x="56" y="456" fill="#8AA0C8" font-size="12.5">AI adoption raises throughput</text>
<text x="56" y="473" fill="#8AA0C8" font-size="12.5">but increases instability.</text>
<text x="56" y="492" fill="#00D9FF" font-size="11">[DORA 2024-2025]</text>
<rect x="318" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="334" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Benchmarks are no gate</text>
<text x="334" y="456" fill="#8AA0C8" font-size="12.5">Frontier agents resolve well</text>
<text x="334" y="473" fill="#8AA0C8" font-size="12.5">under a quarter of tasks.</text>
<text x="334" y="492" fill="#00D9FF" font-size="11">[SWE-bench limits]</text>
<rect x="596" y="408" width="264" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="612" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Long-horizon decay</text>
<text x="612" y="456" fill="#8AA0C8" font-size="12.5">Plans past 8-10 steps</text>
<text x="612" y="473" fill="#8AA0C8" font-size="12.5">degrade rapidly in quality.</text>
<text x="612" y="492" fill="#00D9FF" font-size="11">[planning literature]</text>
<rect x="40" y="516" width="820" height="58" rx="10" fill="#00D9FF"/>
<text x="60" y="542" fill="#0F1419" font-size="14" font-weight="700" letter-spacing="1">SKIPJACK ANSWERS</text>
<text x="60" y="563" fill="#0F1419" font-size="15">Re-expresses SAFe/Scrum intent for agent fleets: WIP-bounded flow, agent-sized work packages, MBSE traceability, test-at-end gate.</text>
<text x="40" y="600" fill="#8AA0C8" font-size="11">FABRICA b2c4-fab-0F14 · governed loop · source-bound</text>
<text x="860" y="600" fill="#8AA0C8" font-size="11" text-anchor="end">Non Sequitur Publishing — Confidential</text>
</svg>
