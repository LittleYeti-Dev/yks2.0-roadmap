<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Helvetica, Arial, sans-serif">
<title>PINAX panel: OCULUS</title>
<desc>NSQ-Wave panel for OCULUS: unobserved-but-valid window problem, source-bound evidence, SKIPJACK answer.</desc>
<rect width="900" height="620" fill="#0F1419"/>
<rect x="0" y="0" width="6" height="620" fill="#00D9FF"/>
<path d="M40 40 q10 -16 20 0 t20 0 t20 0 t20 0 t20 0" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
<text x="40" y="92" fill="#E8EEFC" font-size="34" font-weight="700">OCULUS</text>
<text x="40" y="118" fill="#8AA0C8" font-size="14.5">Observed-Privilege Access · zero-trust PAM</text>
<rect x="690" y="64" width="170" height="30" rx="15" fill="#1A1F2E" stroke="#25324C"/>
<text x="775" y="84" fill="#00D9FF" font-size="13" text-anchor="middle" letter-spacing="1">PL-7 · ACCESS</text>
<line x1="40" y1="140" x2="860" y2="140" stroke="#25324C" stroke-width="1"/>
<text x="40" y="172" fill="#00D9FF" font-size="13" letter-spacing="2">DOCUMENTED PROBLEM</text>
<text x="40" y="200" fill="#E8EEFC" font-size="18">A JIT credential bears authority for its full time-to-live —</text>
<text x="40" y="226" fill="#E8EEFC" font-size="18">whether the operator is watching, asleep, or <tspan fill="#00D9FF" font-weight="700">replayed</tspan>.</text>
<text x="40" y="252" fill="#E8EEFC" font-size="18">Privilege stays valid while no one is observing it.</text>
<rect x="40" y="278" width="820" height="86" rx="10" fill="#1A1F2E" stroke="#00D9FF" stroke-width="1.5"/>
<text x="60" y="316" fill="#E8EEFC" font-size="22" font-weight="700">Every incumbent leaves <tspan fill="#00D9FF">one interval</tspan> open:</text>
<text x="60" y="346" fill="#E8EEFC" font-size="22" font-weight="700">the <tspan fill="#00D9FF">unobserved-but-valid</tspan> window.</text>
<text x="840" y="353" fill="#8AA0C8" font-size="11" text-anchor="end">src: OCULUS §2.4 synthesis</text>
<text x="40" y="396" fill="#00D9FF" font-size="13" letter-spacing="2">SOURCE-BOUND EVIDENCE</text>
<rect x="40" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="56" y="434" fill="#E8EEFC" font-size="14" font-weight="700">JIT is unadopted</text>
<text x="56" y="456" fill="#8AA0C8" font-size="12.5">~1% fully adopt JIT; 91%</text>
<text x="56" y="473" fill="#8AA0C8" font-size="12.5">keep access always-on.</text>
<text x="56" y="492" fill="#00D9FF" font-size="11">[practitioner study, 7]</text>
<rect x="318" y="408" width="265" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="334" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Shadow privilege</text>
<text x="334" y="456" fill="#8AA0C8" font-size="12.5">54% find unmanaged secrets</text>
<text x="334" y="473" fill="#8AA0C8" font-size="12.5">every week.</text>
<text x="334" y="492" fill="#00D9FF" font-size="11">[practitioner study, 7]</text>
<rect x="596" y="408" width="264" height="92" rx="8" fill="#1A1F2E" stroke="#25324C"/>
<text x="612" y="434" fill="#E8EEFC" font-size="14" font-weight="700">Machine-ID sprawl</text>
<text x="612" y="456" fill="#8AA0C8" font-size="12.5">&gt;80:1 over humans; &lt;5% of</text>
<text x="612" y="473" fill="#8AA0C8" font-size="12.5">NHI permissions are used.</text>
<text x="612" y="492" fill="#00D9FF" font-size="11">[NHI research, 2]</text>
<rect x="40" y="516" width="820" height="58" rx="10" fill="#00D9FF"/>
<text x="60" y="542" fill="#0F1419" font-size="14" font-weight="700" letter-spacing="1">SKIPJACK ANSWERS</text>
<text x="60" y="563" fill="#0F1419" font-size="15">Observation is the authorizing condition. Privilege lives only while the session is rendered live; loss of sight fails closed.</text>
<text x="40" y="600" fill="#8AA0C8" font-size="11">OCULUS ocul-obs-0F14 · fail-closed · source-bound</text>
<text x="860" y="600" fill="#8AA0C8" font-size="11" text-anchor="end">Non Sequitur Publishing — Confidential</text>
</svg>
